<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="cal.css">
</head>
<body>
    
    <body>

    <h1><u><i>Calculator</i></u></h1>

    <div>

        <input type="text" id="result" readonly><br>

        <button class="btn" onclick="data('7')">7</button>
        <button class="btn" onclick="data('8')">8</button>
        <button class="btn" onclick="data('9')">9</button>
        <button class="btn" onclick="data('*')">*</button><br>

        <button class="btn" onclick="data('4')">4</button>
        <button class="btn" onclick="data('5')">5</button>
        <button class="btn" onclick="data('6')">6</button>
        <button class="btn" onclick="data('-')">-</button><br>

        <button class="btn" onclick="data('1')">1</button>
        <button class="btn" onclick="data('2')">2</button>
        <button class="btn" onclick="data('3')">3</button>
        <button class="btn" onclick="data('+')">+</button><br>

        <button class="btn" onclick="data('0')">0</button>
        <button class="btn" onclick="data('/')">/</button>
        <button class="btn" onclick="dataclear()">C</button>
        <button class="btn" onclick="answer()">=</button>

    </div>














    <script src="cal.js"></script>
</body>
</html>
